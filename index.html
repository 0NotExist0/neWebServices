<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatto WhatsApp</title>
    <style>
      body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background-color: #f0f2f5; 
        display: flex; 
        justify-content: center; 
        align-items: center;
        height: 100vh;
        margin: 0;
        padding: 20px; 
        box-sizing: border-box;
      }
      .contact-card { 
        background: white; 
        padding: 30px; 
        border-radius: 12px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        width: 100%; 
        max-width: 400px; 
      }
      h2 { 
        color: #25D366; 
        margin-top: 0; 
        text-align: center;
      }
      input, textarea { 
        width: 100%; 
        padding: 12px; 
        margin: 10px 0 15px 0; 
        border: 1px solid #ccc; 
        border-radius: 6px; 
        box-sizing: border-box; 
        font-family: inherit;
        font-size: 14px;
      }
      input:focus, textarea:focus {
        border-color: #25D366;
        outline: none;
      }
      button { 
        width: 100%; 
        padding: 14px; 
        background-color: #25D366; 
        color: white; 
        border: none; 
        border-radius: 6px; 
        cursor: pointer; 
        font-size: 16px; 
        font-weight: bold; 
        transition: background-color 0.3s;
      }
      button:hover { 
        background-color: #128C7E; 
      }
      button:disabled {
        background-color: #9cdbaf;
        cursor: not-allowed;
      }
      #status { 
        margin-top: 15px; 
        font-size: 14px; 
        text-align: center; 
        font-weight: 500;
      }
      .loading { color: #555; }
      .success { color: #2e7d32; }
      .error { color: #d32f2f; }
    </style>
  </head>
  <body>
    <div class="contact-card">
      <h2>Invia un messaggio</h2>
      <form id="contactForm">
        <input type="text" name="nome" placeholder="Il tuo nome" required>
        <input type="email" name="email" placeholder="La tua email" required>
        <textarea name="messaggio" rows="4" placeholder="Scrivi qui il tuo messaggio..." required></textarea>
        <button type="submit" id="submitBtn">Invia su WhatsApp</button>
      </form>
      <div id="status"></div>
    </div>

    <script>
      document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerText = "Invio in corso...";
        status.innerHTML = "";
        status.className = "loading";

        // Il link esatto della tua Versione 6
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxhAPZVyp1vHgVcQQxCXDDc8UES1Jwn1WDkgdlqBoG-kRgSOVbUwODgz4c6GZoti8Y2/exec'; 
        
        // Estraiamo i dati dal form in modo leggibile per Google Apps Script
        const formData = new FormData(this);
        const dataParams = new URLSearchParams();
        for (const pair of formData) {
            dataParams.append(pair[0], pair[1]);
        }

        fetch(scriptURL, { 
            method: 'POST', 
            // Diciamo a Google esplicitamente che tipo di dati stiamo mandando
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: dataParams
        })
        .then(response => {
            if (!response.ok) throw new Error("Errore di rete HTTP: " + response.status);
            return response.json();
        })
        .then(data => {
            if(data.status === "success") {
              status.innerHTML = data.text;
              status.className = "success";
              document.getElementById('contactForm').reset();
            } else {
              status.innerHTML = data.text;
              status.className = "error";
            }
            btn.disabled = false;
            btn.innerText = "Invia su WhatsApp";
        })
        .catch(error => {
            console.error("Dettaglio Errore:", error);
            status.innerHTML = "Errore di connessione. Riprova.";
            status.className = "error";
            btn.disabled = false;
            btn.innerText = "Riprova";
        });
      });
    </script>
  </body>
</html>
